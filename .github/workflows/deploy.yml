name: bko.gellu.one deplyment

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "24.X"
      - name: rum install, build and test
        run: |
          npm install
          npm run build  
          npm run test
